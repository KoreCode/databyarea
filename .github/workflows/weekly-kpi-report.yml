name: Weekly KPI Report

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-weekly-kpi-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build weekly KPI report
        env:
          DBA_KPI_WEBHOOK_URL: ${{ secrets.DBA_KPI_WEBHOOK_URL }}
        run: |
          python -m py_compile scripts/weekly_kpi_report.py
          python scripts/weekly_kpi_report.py --input data/weekly_kpi_inputs.json

      - name: Commit report artifacts if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _deploy/reports data/weekly_kpi_inputs.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: publish weekly automated KPI report"
          git push
