name: Daily Generator

on:
  schedule:
    - cron: "15 11 * * *"   # daily at 11:15 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-generator
  cancel-in-progress: false

jobs:
  generate-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python --version

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Ensure output folders exist
        run: |
          mkdir -p site logs data

      - name: Run generator
        run: python scripts/build_site.py

      - name: Sanity check generated output
        run: |
          test -d site
          find site -name "*.html" | head -20
          count=$(find site -name "*.html" | wc -l)
          echo "Generated HTML files: $count"
          test "$count" -gt 0

      - name: Commit and push changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site data logs
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily generator update"
            git push
          fi