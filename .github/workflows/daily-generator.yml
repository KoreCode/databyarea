name: Daily Generator

on:
  schedule:
    - cron: "15 11 * * *"   # daily at 11:15 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: databyarea-production-checks
  cancel-in-progress: false

jobs:
  validate-production-readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python --version

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Generate service guides
        run: python scripts/generate_service_guides.py

      - name: Ensure output folders exist
        run: |
          mkdir -p _deploy/reports data

      - name: Build search index
        run: python scripts/build_search_index.py

      - name: Validate data layer
        run: python scripts/validate_data_layer.py

      - name: Check for unresolved merge markers
        run: python scripts/check_conflict_markers.py

      - name: Run production readiness checks
        run: python scripts/production_check.py
