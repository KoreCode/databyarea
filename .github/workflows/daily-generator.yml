name: Daily Generator

on:
  schedule:
    - cron: "15 11 * * *"   # daily at 11:15 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: databyarea-production-checks
  cancel-in-progress: false

jobs:
  validate-production-readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python --version

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Ensure output folders exist
        run: |
          mkdir -p _deploy/reports data

      - name: Run production gates
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
        run: python scripts/run_production_gates.py
