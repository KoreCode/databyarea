name: Production Pass

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-pass-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Generate service guides
        run: python scripts/generate_service_guides.py

      - name: Build search index
        run: python scripts/build_search_index.py

      - name: Validate data layer
        run: python scripts/validate_data_layer.py

      - name: Check for unresolved merge markers
        run: python scripts/check_conflict_markers.py

      - name: Run production readiness checks
        run: python scripts/production_check.py
