name: Daily Site Automation

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: databyarea-content-writes
  cancel-in-progress: false

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run full automation pipeline
        env:
          DBA_AUTORUN: '1'
        run: |
          python -m py_compile one_button_daily.py
          bash ./run_daily.sh

      - name: Regenerate tree map
        run: python scripts/generate_tree_map.py

      - name: Generate service guides
        run: python scripts/generate_service_guides.py

      - name: Check for unresolved merge markers
        run: python scripts/check_conflict_markers.py

      - name: Run production readiness checks
        run: python scripts/production_check.py

      - name: Commit and push changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: automated daily site update"
          git push
