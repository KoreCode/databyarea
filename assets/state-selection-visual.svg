<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">State selection visual</title>
  <desc id="desc">Decorative U.S. map style visual for choosing states, counties, and cities.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#112548"/>
      <stop offset="100%" stop-color="#0a152b"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#6ea8ff"/>
      <stop offset="100%" stop-color="#74d8ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)" rx="24"/>
  <g opacity="0.9">
    <rect x="80" y="94" width="300" height="190" rx="16" fill="#173564" stroke="#6ea8ff"/>
    <rect x="420" y="130" width="260" height="160" rx="16" fill="#173564" stroke="#6ea8ff"/>
    <rect x="700" y="92" width="210" height="150" rx="16" fill="#173564" stroke="#6ea8ff"/>
    <rect x="185" y="312" width="320" height="172" rx="16" fill="#173564" stroke="#6ea8ff"/>
    <rect x="530" y="338" width="280" height="160" rx="16" fill="#173564" stroke="#6ea8ff"/>
    <rect x="835" y="285" width="230" height="182" rx="16" fill="#173564" stroke="#6ea8ff"/>
  </g>
  <g>
    <rect x="110" y="555" width="230" height="68" rx="34" fill="url(#chip)"/>
    <text x="225" y="598" text-anchor="middle" fill="#07142c" font-size="28" font-family="Arial, sans-serif" font-weight="700">Choose State</text>

    <rect x="380" y="555" width="300" height="68" rx="34" fill="url(#chip)"/>
    <text x="530" y="598" text-anchor="middle" fill="#07142c" font-size="28" font-family="Arial, sans-serif" font-weight="700">Compare Counties</text>

    <rect x="720" y="555" width="280" height="68" rx="34" fill="url(#chip)"/>
    <text x="860" y="598" text-anchor="middle" fill="#07142c" font-size="28" font-family="Arial, sans-serif" font-weight="700">Explore Cities</text>
  </g>
</svg>
